<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" preserveAspectRatio="xMidYMid meet" role="img" aria-label="Animated orbital scene — three satellites orbiting Earth against a starfield">
  <defs>
    <radialGradient id="earth" cx="40%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#79C0FF"/>
      <stop offset="55%" stop-color="#1F6FEB"/>
      <stop offset="100%" stop-color="#0D1117"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#58A6FF" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#58A6FF" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="stripe" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0D1117"/>
      <stop offset="50%" stop-color="#1F6FEB"/>
      <stop offset="100%" stop-color="#0D1117"/>
    </linearGradient>

    <path id="orbitA" d="M 480 170 a 180 52 0 1 1 360 0 a 180 52 0 1 1 -360 0"/>
    <path id="orbitB" d="M 400 170 a 260 78 0 1 0 520 0 a 260 78 0 1 0 -520 0"/>
    <path id="orbitC" d="M 300 170 a 360 110 0 1 1 720 0 a 360 110 0 1 1 -720 0"/>

    <g id="satA">
      <rect x="-14" y="-2" width="6" height="4" fill="#1F6FEB"/>
      <rect x="8"  y="-2" width="6" height="4" fill="#1F6FEB"/>
      <rect x="-7" y="-3" width="14" height="6" fill="#79C0FF" stroke="#58A6FF" stroke-width="0.5"/>
      <line x1="-14" y1="0" x2="14" y2="0" stroke="#58A6FF" stroke-width="0.5"/>
    </g>
    <g id="satB">
      <rect x="-16" y="-1.5" width="6" height="3" fill="#58A6FF"/>
      <rect x="10"  y="-1.5" width="6" height="3" fill="#58A6FF"/>
      <rect x="-8"  y="-3" width="16" height="6" rx="1" fill="#79C0FF" stroke="#4493F8" stroke-width="0.5"/>
    </g>
    <g id="satC">
      <rect x="-12" y="-1" width="4" height="2" fill="#4493F8"/>
      <rect x="8"   y="-1" width="4" height="2" fill="#4493F8"/>
      <rect x="-6"  y="-2" width="12" height="4" rx="1" fill="#79C0FF"/>
    </g>
  </defs>

  <rect width="1200" height="320" fill="#0D1117"/>

  <!-- subtle grid / starfield stripes -->
  <rect x="0" y="0" width="1200" height="1" fill="url(#stripe)" opacity="0.5"/>
  <rect x="0" y="319" width="1200" height="1" fill="url(#stripe)" opacity="0.5"/>

  <!-- stars -->
  <g fill="#79C0FF">
    <circle cx="60"   cy="40"  r="1.2"><animate attributeName="opacity" values="0.2;1;0.2" dur="3.2s" repeatCount="indefinite"/></circle>
    <circle cx="140"  cy="90"  r="0.9"><animate attributeName="opacity" values="0.3;1;0.3" dur="4.1s" repeatCount="indefinite"/></circle>
    <circle cx="220"  cy="50"  r="1.4"><animate attributeName="opacity" values="0.1;1;0.1" dur="2.8s" repeatCount="indefinite"/></circle>
    <circle cx="310"  cy="35"  r="0.8"><animate attributeName="opacity" values="0.4;1;0.4" dur="3.6s" repeatCount="indefinite"/></circle>
    <circle cx="380"  cy="85"  r="1.1"><animate attributeName="opacity" values="0.2;1;0.2" dur="4.7s" repeatCount="indefinite"/></circle>
    <circle cx="470"  cy="40"  r="0.9"><animate attributeName="opacity" values="0.3;1;0.3" dur="3.0s" repeatCount="indefinite"/></circle>
    <circle cx="560"  cy="70"  r="1.3"><animate attributeName="opacity" values="0.2;1;0.2" dur="5.1s" repeatCount="indefinite"/></circle>
    <circle cx="650"  cy="30"  r="0.7"><animate attributeName="opacity" values="0.4;1;0.4" dur="2.4s" repeatCount="indefinite"/></circle>
    <circle cx="740"  cy="60"  r="1.0"><animate attributeName="opacity" values="0.2;1;0.2" dur="3.9s" repeatCount="indefinite"/></circle>
    <circle cx="820"  cy="90"  r="1.2"><animate attributeName="opacity" values="0.3;1;0.3" dur="4.3s" repeatCount="indefinite"/></circle>
    <circle cx="900"  cy="45"  r="0.8"><animate attributeName="opacity" values="0.2;1;0.2" dur="3.5s" repeatCount="indefinite"/></circle>
    <circle cx="980"  cy="80"  r="1.3"><animate attributeName="opacity" values="0.4;1;0.4" dur="2.7s" repeatCount="indefinite"/></circle>
    <circle cx="1060" cy="40"  r="0.9"><animate attributeName="opacity" values="0.2;1;0.2" dur="3.3s" repeatCount="indefinite"/></circle>
    <circle cx="1130" cy="85"  r="1.1"><animate attributeName="opacity" values="0.3;1;0.3" dur="4.0s" repeatCount="indefinite"/></circle>

    <circle cx="100"  cy="260" r="0.9"><animate attributeName="opacity" values="0.2;1;0.2" dur="3.8s" repeatCount="indefinite"/></circle>
    <circle cx="200"  cy="290" r="1.2"><animate attributeName="opacity" values="0.3;1;0.3" dur="2.9s" repeatCount="indefinite"/></circle>
    <circle cx="310"  cy="270" r="0.8"><animate attributeName="opacity" values="0.4;1;0.4" dur="4.4s" repeatCount="indefinite"/></circle>
    <circle cx="420"  cy="295" r="1.1"><animate attributeName="opacity" values="0.2;1;0.2" dur="3.2s" repeatCount="indefinite"/></circle>
    <circle cx="560"  cy="280" r="0.9"><animate attributeName="opacity" values="0.3;1;0.3" dur="4.8s" repeatCount="indefinite"/></circle>
    <circle cx="700"  cy="295" r="1.3"><animate attributeName="opacity" values="0.1;1;0.1" dur="2.6s" repeatCount="indefinite"/></circle>
    <circle cx="820"  cy="265" r="0.8"><animate attributeName="opacity" values="0.4;1;0.4" dur="3.7s" repeatCount="indefinite"/></circle>
    <circle cx="930"  cy="290" r="1.0"><animate attributeName="opacity" values="0.2;1;0.2" dur="4.2s" repeatCount="indefinite"/></circle>
    <circle cx="1050" cy="275" r="1.2"><animate attributeName="opacity" values="0.3;1;0.3" dur="3.1s" repeatCount="indefinite"/></circle>
    <circle cx="1150" cy="295" r="0.7"><animate attributeName="opacity" values="0.2;1;0.2" dur="5.0s" repeatCount="indefinite"/></circle>
  </g>

  <!-- shooting star -->
  <g opacity="0.9">
    <line x1="0" y1="0" x2="60" y2="14" stroke="#79C0FF" stroke-width="1.4" stroke-linecap="round"/>
    <animateTransform attributeName="transform" type="translate" from="-80 20" to="1280 260" dur="9s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.9;0" dur="9s" repeatCount="indefinite"/>
  </g>

  <!-- orbit paths (visible, faint) -->
  <use href="#orbitC" stroke="#1F6FEB" stroke-width="0.6" fill="none" stroke-dasharray="2 5" opacity="0.30"/>
  <use href="#orbitB" stroke="#1F6FEB" stroke-width="0.6" fill="none" stroke-dasharray="2 5" opacity="0.40"/>
  <use href="#orbitA" stroke="#1F6FEB" stroke-width="0.6" fill="none" stroke-dasharray="2 5" opacity="0.55"/>

  <!-- earth -->
  <circle cx="660" cy="170" r="120" fill="url(#glow)"/>
  <circle cx="660" cy="170" r="70" fill="url(#earth)" stroke="#58A6FF" stroke-width="0.6"/>
  <!-- meridians -->
  <ellipse cx="660" cy="170" rx="70" ry="22" fill="none" stroke="#58A6FF" stroke-width="0.4" opacity="0.5"/>
  <ellipse cx="660" cy="170" rx="22" ry="70" fill="none" stroke="#58A6FF" stroke-width="0.4" opacity="0.5"/>
  <!-- subtle continents (abstract) -->
  <path d="M 620 150 q 10 -8 22 -2 q 10 4 8 14 q -2 10 -14 8 q -18 -2 -16 -20 z" fill="#0D1117" opacity="0.55"/>
  <path d="M 680 180 q 14 -6 24 2 q 6 8 -4 14 q -12 6 -22 -2 q -6 -6 2 -14 z" fill="#0D1117" opacity="0.45"/>

  <!-- satellites orbiting -->
  <use href="#satA">
    <animateMotion dur="9s" repeatCount="indefinite" rotate="auto">
      <mpath href="#orbitA"/>
    </animateMotion>
  </use>
  <use href="#satB">
    <animateMotion dur="14s" repeatCount="indefinite" rotate="auto" keyPoints="1;0" keyTimes="0;1" calcMode="linear">
      <mpath href="#orbitB"/>
    </animateMotion>
  </use>
  <use href="#satC">
    <animateMotion dur="20s" repeatCount="indefinite" rotate="auto">
      <mpath href="#orbitC"/>
    </animateMotion>
  </use>

  <!-- uplink beams from Earth to satA (pulsing) -->
  <g stroke="#58A6FF" stroke-width="0.8" opacity="0.5">
    <line x1="660" y1="170" x2="840" y2="170">
      <animate attributeName="opacity" values="0.1;0.7;0.1" dur="2.2s" repeatCount="indefinite"/>
    </line>
  </g>

  <!-- title -->
  <g font-family="'JetBrains Mono', 'Fira Code', ui-monospace, monospace">
    <text x="600" y="40" text-anchor="middle" fill="#58A6FF" font-size="22" font-weight="700" letter-spacing="6">
      MISSION · CONTROL
    </text>
    <text x="600" y="64" text-anchor="middle" fill="#79C0FF" font-size="11" letter-spacing="3" opacity="0.8">
      CLOUD INFRASTRUCTURE · DEVOPS · EARTH OBSERVATION · SPACE TECHNOLOGY
    </text>
    <text x="600" y="305" text-anchor="middle" fill="#1F6FEB" font-size="9" letter-spacing="4" opacity="0.75">
      [ LINK UP · 500ms · SIG STRONG · ALL SYSTEMS NOMINAL ]
    </text>
  </g>
</svg>
